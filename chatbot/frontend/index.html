<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVA — AI Astronomer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #04050f;
      --bg2: #080b1a;
      --surface: #0d1128;
      --surface2: #111830;
      --border: rgba(100, 140, 255, 0.15);
      --accent: #4f7cff;
      --accent2: #a259ff;
      --accent3: #00e5ff;
      --gold: #ffd166;
      --text: #dce8ff;
      --text-dim: #7a8fb5;
      --danger: #ff6b6b;
      --green: #06d6a0;
      --glow: rgba(79, 124, 255, 0.35);
      --glow2: rgba(162, 89, 255, 0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── STARFIELD ── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NEBULA BLOBS ── */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .nebula-1 { width: 600px; height: 600px; background: radial-gradient(circle, #4f7cff, transparent); top: -150px; left: -150px; }
    .nebula-2 { width: 500px; height: 500px; background: radial-gradient(circle, #a259ff, transparent); bottom: -100px; right: -100px; }
    .nebula-3 { width: 350px; height: 350px; background: radial-gradient(circle, #00e5ff, transparent); top: 40%; left: 60%; }

    /* ── LAYOUT ── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
    }

    .avatar-ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent3), var(--accent));
      padding: 2px;
      animation: spin 8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }

    .header-info h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-info p {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── SCENARIO BADGE ── */
    #scenario-badge {
      margin-left: auto;
      font-size: 0.65rem;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: var(--surface);
      transition: all 0.4s ease;
      white-space: nowrap;
    }
    #scenario-badge.s1 { border-color: var(--gold); color: var(--gold); background: rgba(255,209,102,0.08); }
    #scenario-badge.s2 { border-color: var(--green); color: var(--green); background: rgba(6,214,160,0.08); }
    #scenario-badge.s3 { border-color: var(--danger); color: var(--danger); background: rgba(255,107,107,0.08); }

    /* ── SUGGESTED QUESTIONS ── */
    #suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px 0 10px;
      border-bottom: 1px solid var(--border);
    }

    .suggest-btn {
      font-size: 0.72rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .suggest-btn:hover {
      color: var(--accent3);
      border-color: var(--accent3);
      background: rgba(0,229,255,0.06);
    }

    /* ── CHAT WINDOW ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── MESSAGES ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .msg-icon.nova-icon {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 14px var(--glow);
    }
    .msg-icon.user-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 0.9rem;
    }

    .bubble.nova {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .bubble.user {
      background: linear-gradient(135deg, var(--accent), #3a5fd9);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .bubble .scenario-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-bottom: 8px;
      opacity: 0.8;
    }
    .scenario-tag.s1 { background: rgba(255,209,102,0.15); color: var(--gold); }
    .scenario-tag.s2 { background: rgba(6,214,160,0.15); color: var(--green); }
    .scenario-tag.s3 { background: rgba(255,107,107,0.15); color: var(--danger); }

    /* ── TYPING INDICATOR ── */
    .typing-bubble {
      display: flex; gap: 5px;
      align-items: center;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 100% { opacity: 0.3; transform: scale(0.8) translateY(0); }
      50% { opacity: 1; transform: scale(1) translateY(-4px); }
    }

    /* ── WELCOME MESSAGE ── */
    .welcome-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }
    .welcome-card h2 {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      letter-spacing: 2px;
      color: var(--accent3);
      margin-bottom: 10px;
    }
    .welcome-card p {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 16px 0 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 12px 16px;
      resize: none;
      min-height: 46px;
      max-height: 130px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--text-dim); }
    #msg-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,124,255,0.15);
    }

    #send-btn {
      width: 46px; height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 4px 16px var(--glow);
      flex-shrink: 0;
    }
    #send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--glow); }
    #send-btn:active { transform: translateY(0); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div id="app">
  <header>
    <div class="avatar-ring">
      <div class="avatar-inner">🔭</div>
    </div>
    <div class="header-info">
      <h1>NOVA</h1>
      <p><span class="status-dot"></span>NEBULA-ORIENTED VIRTUAL ASTRONOMER</p>
    </div>
    <div id="scenario-badge">STANDBY</div>
  </header>

  <div id="suggestions">
    <button class="suggest-btn" onclick="sendSuggestion(this)">🌑 Tell me about black holes</button>
    <button class="suggest-btn" onclick="sendSuggestion(this)">🚀 What is the James Webb Telescope?</button>
    <button class="suggest-btn" onclick="sendSuggestion(this)">🪐 Saturn's moons?</button>
    <button class="suggest-btn" onclick="sendSuggestion(this)">⭐ How do stars die?</button>
    <button class="suggest-btn" onclick="sendSuggestion(this)">🌌 What is dark matter?</button>
    <button class="suggest-btn" onclick="sendSuggestion(this)">🍕 Best pizza recipe?</button>
  </div>

  <div id="chat-window">
    <div class="msg-row nova">
      <div class="msg-icon nova-icon">🔭</div>
      <div class="bubble nova welcome-card">
        <h2>SYSTEM ONLINE</h2>
        <p>Greetings, explorer. I'm <strong>NOVA</strong> — your Nebula-Oriented Virtual Astronomer. 
        Ask me anything about the cosmos: planets, stars, black holes, space missions, galaxies, 
        or the mysteries of the universe. The stars await. 🌠</p>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Ask NOVA about the cosmos…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ── STARFIELD CANVAS ──
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5,
        a: Math.random(),
        speed: 0.003 + Math.random() * 0.005,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const opacity = s.a * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,210,255,${opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  requestAnimationFrame(draw);
})();

// ── CHAT LOGIC ──
const chatWindow = document.getElementById('chat-window');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const scenarioBadge = document.getElementById('scenario-badge');

const SCENARIO_LABELS = {
  1: { text: 'OUT OF DOMAIN', cls: 's1' },
  2: { text: 'RAG HIT',       cls: 's2' },
  3: { text: 'RAG MISS',      cls: 's3' }
};

// Auto-resize textarea
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 130) + 'px';
});

// Enter to send (Shift+Enter = newline)
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function appendMessage(content, role, scenario = null) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const icon = document.createElement('div');
  icon.className = `msg-icon ${role === 'nova' ? 'nova-icon' : 'user-icon'}`;
  icon.textContent = role === 'nova' ? '🔭' : '👤';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  if (scenario && SCENARIO_LABELS[scenario]) {
    const tag = document.createElement('div');
    tag.className = `scenario-tag ${SCENARIO_LABELS[scenario].cls}`;
    tag.textContent = `SCN-0${scenario} · ${SCENARIO_LABELS[scenario].text}`;
    bubble.appendChild(tag);
    bubble.appendChild(document.createElement('br'));
  }

  const text = document.createElement('span');
  text.textContent = content;
  bubble.appendChild(text);

  row.appendChild(icon);
  row.appendChild(bubble);
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return row;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row nova';
  row.id = 'typing-row';

  const icon = document.createElement('div');
  icon.className = 'msg-icon nova-icon';
  icon.textContent = '🔭';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'typing-dot';
    bubble.appendChild(d);
  }

  row.appendChild(icon);
  row.appendChild(bubble);
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function updateBadge(scenario) {
  scenarioBadge.className = '';
  if (scenario && SCENARIO_LABELS[scenario]) {
    scenarioBadge.classList.add(SCENARIO_LABELS[scenario].cls);
    scenarioBadge.textContent = SCENARIO_LABELS[scenario].text;
  }
}

function sendSuggestion(btn) {
  const text = btn.textContent.replace(/^[^\s]+\s/, '').trim(); // strip emoji
  msgInput.value = text;
  sendMessage();
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || sendBtn.disabled) return;

  // Clear input
  msgInput.value = '';
  msgInput.style.height = 'auto';

  // Show user message
  appendMessage(text, 'user');

  // Disable input
  sendBtn.disabled = true;
  msgInput.disabled = true;

  // Show typing
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) {
      appendMessage('⚠️ ' + data.error, 'nova');
    } else {
      appendMessage(data.answer, 'nova', data.scenario);
      updateBadge(data.scenario);
    }
  } catch (err) {
    hideTyping();
    appendMessage('⚠️ Connection error. Make sure the NOVA server is running.', 'nova');
  } finally {
    sendBtn.disabled = false;
    msgInput.disabled = false;
    msgInput.focus();
  }
}
</script>
</body>
</html>
